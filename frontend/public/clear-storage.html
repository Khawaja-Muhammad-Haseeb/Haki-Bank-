<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Browser Storage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        button {
            background: #0066CC;
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin: 0.5rem;
        }
        button:hover {
            background: #0052a3;
        }
        .success {
            color: #28a745;
            font-weight: bold;
            margin-top: 1rem;
        }
        .info {
            color: #666;
            margin: 1rem 0;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Clear Browser Storage</h1>
        <p class="info">
            This will clear all stored authentication tokens and user data from your browser.
            <br><br>
            <strong>Use this if you're experiencing:</strong><br>
            • Auto-login issues<br>
            • 404 errors on transactions or bills<br>
            • Token-related problems<br>
            • Need to switch accounts
        </p>
        <button onclick="clearStorage()">Clear Storage & Reload</button>
        <div id="message"></div>
    </div>

    <script>
        function clearStorage() {
            try {
                // Clear localStorage
                localStorage.clear();
                
                // Clear sessionStorage
                sessionStorage.clear();
                
                // Show success message
                document.getElementById('message').innerHTML = 
                    '<p class="success">✅ Storage cleared successfully!<br>Redirecting to login...</p>';
                
                // Redirect to login after 2 seconds
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            } catch (error) {
                document.getElementById('message').innerHTML = 
                    '<p style="color: red;">❌ Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
